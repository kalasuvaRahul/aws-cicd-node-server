version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm ci

  pre_build:
    commands:
      - npm run test

  build:
    commands:
      - npm run build

artifacts:
  files:
    - dist/**/*
    - package.json
    - package-lock.json
    - appspec.yml
    - ecosystem.config.js
    - scripts/**/*
